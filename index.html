<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Instant Website Generator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  text-align: center;
}

header {
  padding: 60px 20px;
  background: linear-gradient(135deg, #111, #222);
}

h1 { font-size: 36px; }

input, select {
  width: 85%;
  max-width: 400px;
  padding: 12px;
  margin: 10px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 12px 18px;
  background: #00ffcc;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
  margin-top: 10px;
}

#output {
  margin-top: 20px;
  background: #161616;
  padding: 20px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
  border-radius: 10px;
  text-align: left;
  white-space: pre-wrap;
}

.small {
  opacity: 0.7;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
<h1>Apex Instant Website Generator</h1>
<p class="small">Generate a full business website in seconds</p>
</header>

<section>

<input id="business" placeholder="Business Name">
<input id="industry" placeholder="Industry">

<select id="style">
  <option>Modern</option>
  <option>Luxury</option>
  <option>Simple</option>
  <option>Bold</option>
</select>

<br>

<button onclick="generate()">Generate Website</button>

<div id="output">Your generated website will appear here...</div>

</section>

<script>
async function generate() {
  const business = document.getElementById("business").value;
  const industry = document.getElementById("industry").value;

  document.getElementById("output").innerText = "Generating...";

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ business, industry })
  });

  const data = await res.json();

  document.getElementById("output").innerText = data.html;

  // copy button feature
  const btn = document.createElement("button");
  btn.innerText = "Copy Website Code";
  btn.onclick = () => {
    navigator.clipboard.writeText(data.html);
    alert("Copied!");
  };

  document.getElementById("output").appendChild(document.createElement("br"));
  document.getElementById("output").appendChild(btn);
}
</script>

</body>
</html>
